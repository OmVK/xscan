<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>
    <linearGradient id="scan" x1="230" y1="512" x2="794" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>

  <!-- Scanner viewfinder brackets -->
  <g stroke="#FFFFFF" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92">
    <path d="M232 340 V264 a32 32 0 0 1 32 -32 H340"/>
    <path d="M684 232 H760 a32 32 0 0 1 32 32 V340"/>
    <path d="M792 684 V760 a32 32 0 0 1 -32 32 H684"/>
    <path d="M340 792 H264 a32 32 0 0 1 -32 -32 V684"/>
  </g>

  <!-- Bold X -->
  <g stroke="#FFFFFF" stroke-width="86" stroke-linecap="round" fill="none">
    <line x1="392" y1="392" x2="632" y2="632"/>
    <line x1="632" y1="392" x2="392" y2="632"/>
  </g>

  <!-- Neon scan line -->
  <rect x="230" y="500" width="564" height="24" rx="12" fill="url(#scan)" filter="url(#glow)"/>
</svg>
